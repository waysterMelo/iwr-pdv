services:
  postgres:
    image: postgres:16-alpine
    container_name: iwr-pdv-postgres
    environment:
      POSTGRES_DB: iwr_pdv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iwr_pdv"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
