server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: iwr-pdv-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iwr_pdv}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when-authorized}

info:
  app:
    name: IWR PDV Backend
    description: Store management platform for IWR Modas.
    sprint: Sprint 7

app:
  auth:
    default-admin:
      username: ${DEFAULT_ADMIN_USERNAME:admin}
      password: ${DEFAULT_ADMIN_PASSWORD:admin123}
      display-name: ${DEFAULT_ADMIN_DISPLAY_NAME:Administrador}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
